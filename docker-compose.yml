version: "3.9"

services:
  user-simulator:
    build: ./services/UserSimulator
    container_name: user-simulator
    ports:
      - "8081:8080"

  orchestrator:
    build: ./services/Orchestrator
    container_name: orchestrator
    ports:
      - "8080:8080"
    environment:
      USER_SIM_URL: "http://user-simulator:8080"
    depends_on:
      - user-simulator

  streaming-server:
    build: ./services/StreamingServer
    ports:
      - "8082:8000"
    restart: unless-stopped

