version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=events
      - POSTGRES_PASSWORD=events
      - POSTGRES_DB=events
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d events"]
      interval: 5s
      timeout: 3s
      retries: 10
    
  metabase:
    image: metabase/metabase:latest
    ports:
      - "4000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
    depends_on:
      - db

  event-store:
    build: ./services/EventStore
    ports:
      - "8083:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://events:events@db:5432/events
      - INGEST_TOKEN=devtoken         # simple shared secret (optional)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  streaming-server:
    build: ./services/StreamingServer
    ports:
      - "8082:8000"                     # host:container
    environment:
      - LOG_LEVEL=INFO
      - EVENT_STORE_URL=http://event-store:8000
      - EVENT_BATCH_MAX=200
      - EVENT_FLUSH_MS=1000
      - INGEST_TOKEN=devtoken 
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  user-simulator:
    build: ./services/UserSimulator
    # container_name: user-simulator   # (opsional) sebaiknya dihapus biar DNS default mulus
    ports:
      - "8081:8000"
    environment:
      - STREAMING_SERVER_URL=http://streaming-server:8000   # ← pakai port **internal** 8080
      - LOG_LEVEL=DEBUG
    depends_on:
      streaming-server:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build: ./services/Orchestrator
    # container_name: orchestrator     # (opsional) sebaiknya dihapus
    ports:
      - "8080:8000"
    environment:
      - USER_SIM_URL=http://user-simulator:8000
      - LOG_LEVEL=INFO
    depends_on:
      user-simulator:
        condition: service_started
    restart: unless-stopped


